<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icona della scheda del browser (Favicon) -->
    <link rel="icon" type="image/x-icon" href="myicon.ico">

    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            
            /* SFONDO DINAMICO */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('sfondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            text-align: center; 
            max-width: 420px; 
            width: 90%; 
            backdrop-filter: blur(5px);
        }

        .app-icon {
            width: 80px; /* Ridotto leggermente per i file .ico */
            height: 80px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        h1 { color: #1a1a1a; margin: 0 0 10px 0; font-size: 1.8rem; }
        p { color: #555; line-height: 1.6; margin-bottom: 30px; }

        .btn-download { 
            display: inline-block; 
            background-color: #2ecc71; 
            color: white; 
            padding: 16px 32px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); 
        }

        .btn-download:hover { 
            background-color: #27ae60; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6);
        }

        .info-box { 
            margin-top: 30px; 
            font-size: 0.85rem; 
            color: #777; 
            border-top: 1px solid #eee; 
            padding-top: 20px; 
        }

        .warning { color: #d35400; font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <!-- Icona del programma visibile nella card -->
    <img src="myicon.ico" alt="Logo" class="app-icon">
    
    <h1>KML Converter</h1>

    <!-- SOSTITUISCI IL LINK QUI SOTTO -->

    </a>

    <div class="info-box">
        <span class="warning">⚠️ Avviso Windows Defender:</span>
        Se appare l'avviso "PC protetto", clicca su <b>Ulteriori informazioni</b> e poi su <b>Esegui comunque</b>.
