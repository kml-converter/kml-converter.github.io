<!DOCTYPE html>

    :root {
        --primary: #00ff88; /* Verde fluo più moderno */
        --primary-hover: #00db77;

        --text: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
        font-family: 'Inter', -apple-system, sans-serif; 
        height: 100vh;
        display: flex; 
        justify-content: center; 
        align-items: center;
        overflow: hidden;
        background: #0f172a; /* Blu scuro profondo di base */
    }

    /* SFONDO ANIMATO MESH GRADIENT */
    .bg-container {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        background: url('sfondo.png');
        background-size: cover;
        background-position: center;
    }

    .bg-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(45deg, #0f172aeb, #1e293bee, #0f172adb);
        backdrop-filter: blur(10px); /* Sfoca l'immagine di sfondo per un look pulito */
    }

    /* CARD DARK MODE GLASS */
    .card { 
        background: rgba(30, 41, 59, 0.7); 
        padding: 60px 40px; 
        border-radius: 30px; 
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        text-align: center; 
        max-width: 450px; 
        width: 90%; 
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .app-icon {
        width: 110px;
        height: 110px;
        margin-bottom: 25px;
        filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.3));
        transition: all 0.4s ease;
    }

    .app-icon:hover { 
        transform: scale(1.15) rotate(-5deg);
        filter: drop-shadow(0 0 25px rgba(0, 255, 136, 0.5));
    }

    h1 { color: #fff; font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -1.5px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 40px; font-size: 1.1rem; }

    /* PULSANTE NEON */
    .btn-download { 
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--primary); 
        color: #0f172a; 
        padding: 20px 40px; 
        text-decoration: none; 
        border-radius: 16px; 
        font-weight: 800; 
        font-size: 1.25rem;
        transition: all 0.3s; 
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-download:hover { 
        background: #fff; 
        transform: scale(1.02);
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
    }

    /* INFO BOX */
    .info-box { 
        margin-top: 40px; 
        font-size: 0.85rem; 
        color: #64748b; 
        border-top: 1px solid rgba(255, 255, 255, 0.05); 
        padding-top: 25px; 
    }

    .warning { color: var(--primary); font-weight: bold; display: block; margin-bottom: 8px; opacity: 0.8; }
    
    .version-tag {
        background: rgba(0, 255, 136, 0.1);
        padding: 6px 16px;
        border-radius: 100px;
        font-size: 0.75rem;
        color: var(--primary);
        font-weight: bold;
        margin-bottom: 15px;
        display: inline-block;
        border: 1px solid rgba(0, 255, 136, 0.2);
    }
</style>

</head>

</html>
