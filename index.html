<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KML Converter | Download Ufficiale</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="myicon.ico">

    <style>
        :root {
            --primary: #2ecc71;
            --primary-hover: #27ae60;
            --text-dark: #2c3e50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
            background: #000;
        }

        /* SFONDO ANIMATO */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('sfondo.png');
            background-size: cover;
            background-position: center;
            animation: zoomBg 20s infinite alternate ease-in-out;
        }

        @keyframes zoomBg {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* CARD EFFETTO VETRO */
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 25px;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .app-icon:hover { transform: scale(1.1) rotate(5deg); }

        h1 { color: var(--text-dark); font-size: 2.2rem; margin-bottom: 15px; letter-spacing: -1px; }
        p { color: #5a6c7d; line-height: 1.6; margin-bottom: 35px; font-size: 1.05rem; }

        /* PULSANTE DESIGN */
        .btn-download { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary); 
            color: white; 
            padding: 18px 40px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1.2rem;
            transition: all 0.3s; 
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            width: 100%;
        }

        .btn-download:hover { 
            background: var(--primary-hover); 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.5);
        }

        .btn-download svg { margin-right: 10px; width: 24px; height: 24px; fill: white; }

        /* INFO BOX */
        .info-box { 
            margin-top: 35px; 
            font-size: 0.85rem; 
            color: #7f8c8d; 
            border-top: 1px solid rgba(0,0,0,0.1); 
            padding-top: 25px; 
        }

        .warning { color: #e67e22; font-weight: bold; display: block; margin-bottom: 8px; }
        
        .version-tag {
            background: #ecf0f1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="bg-container"></div>

<div class="card">
    <img src="myicon.ico" alt="Logo" class="app-icon">
    
    <span class="version-tag">Versione v1.0.0</span>
    <h1>KML Converter</h1>
    <p>La soluzione definitiva per convertire i tuoi file geografici in pochi secondi. Sicuro, leggero e gratuito.</p>

        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Scarica Gratis
    </a>

    <div class="info-box">
        <span class="warning">🔒 Software Verificato</span>
        Se appare "PC protetto", clicca su <b>Ulteriori info</b> e poi <b>Esegui comunque</b>.
    </div>
</div>

</body>
</html>
