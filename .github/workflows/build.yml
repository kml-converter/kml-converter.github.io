name: Compila con Nuitka

on:
  push:
    tags:
      - 'v*' # Si attiva quando crei una release con tag (es. v1.0.0)

jobs:
  build:
    strategy:
      matrix:
        # Nota: pywinauto e pygetwindow funzionano solo su Windows. 
        # Se il tool è solo per Windows, lascia solo windows-latest.
        os: [windows-latest] 
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: nwc.py
          onefile: true
          # Plugin necessari per Pillow e le librerie di automazione/rete
          enable-plugins: tk-inter,multiprocessing
          # Forza l'inclusione dei pacchetti critici del tuo requirements
          include-package: cryptography,selenium,pywinauto,pyautogui,pygetwindow,PIL
          follow-imports: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/*.exe
            build/*.bin
            XMLCONVERTER.pdf # <--- CAMBIA CON IL NOME VERO DEL PDF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
