name: Compila con Nuitka

on:
  push:
    tags:
      - 'v*' # Si attiva quando crei un tag (es. v1.0)

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest] # Crea versioni per Win e Linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # O la tua versione

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: tuo_script.py # <--- CAMBIA QUESTO
          onefile: true
          # include-data-files: manuale.pdf=manuale.pdf # Se vuoi includere il PDF nell'eseguibile

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.exe
            build/*.bin
            manuale.pdf # Carica anche il PDF separatamente nella release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
